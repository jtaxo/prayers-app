<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Pedidos de Oração</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container admin-container">
        <div class="header-actions">
            <h1>Dashboard de Orações</h1>
            <button onclick="window.location.href='/'" class="btn-secondary">Ir para o Formulário</button>
        </div>
        
        <div class="qr-section" style="margin-bottom: 30px; border-top: none; padding-top: 0; padding-bottom: 20px; border-bottom: 1px solid var(--border-color);">
            <p><strong>QR Code para partilhar:</strong></p>
            <p style="font-size: 12px; color: #94a3b8; margin-bottom: 10px;">URL: http://{{ local_ip }}:5000/</p>
            <img src="/qrcode" alt="QR Code" width="150" height="150">
        </div>

        <div class="prayer-grid">
            {% if prayers %}
                {% for prayer in prayers %}
                <div class="prayer-card">
                    <div class="prayer-header">
                        <span class="prayer-name">{{ prayer['nome'] }}</span>
                        <span class="prayer-date">{{ prayer['data_submissao'] }}</span>
                    </div>
                    <div class="prayer-body">{{ prayer['assunto'] }}</div>
                </div>
                {% endfor %}
            {% else %}
                <div class="empty-state">
                    Ainda não há pedidos de oração registados.
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
