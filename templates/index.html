<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos de Oração - AD Azambuja</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Background Elements -->
    <div class="glow-bg"></div>
    <div class="watermark" style="background-image: url('{{ url_for('static', filename='logo.png') }}');"></div>

    <!-- Header -->
    <div class="brand-pill">
        <span class="brand-ad">AD</span>
        <span class="brand-text">Azambuja</span>
    </div>

    <!-- Layout -->
    <div class="layout-split">
        <div class="hero-section">
            <h1 class="hero-title">BEM-VINDO</h1>
            <h2 class="hero-subtitle">PEDIDOS DE ORAÇÃO</h2>
            <p class="hero-text">Não está sozinho. Deixe o seu pedido e a nossa igreja estará a orar por si e pela sua família. O seu pedido será tratado com o máximo respeito e confidencialidade.</p>
        </div>

        <div class="form-section">
            <h3 class="form-title">Deixe aqui o seu pedido.</h3>
            <div class="form-card">
                <form method="POST" action="/">
                    <div class="form-group">
                        <label for="nome">O seu Nome</label>
                        <input type="text" id="nome" name="nome" required placeholder="Ex: João Silva">
                    </div>

                    <div class="form-group">
                        <label for="telemovel">O seu Telemóvel (Opcional)</label>
                        <input type="tel" id="telemovel" name="telemovel" placeholder="Ex: 912 345 678">
                    </div>
                    
                    <div class="form-group">
                        <label for="assunto">Assunto de Oração</label>
                        <textarea id="assunto" name="assunto" required placeholder="Descreva aqui o seu pedido de oração..."></textarea>
                    </div>
                    
                    <button type="submit" class="submit-btn">Enviar Pedido</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
