<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos de Oração</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Pedidos de Oração</h1>
        <p class="subtitle">Deixe o seu pedido, e nós estaremos orando por si.</p>
        
        <form method="POST" action="/">
            <div class="form-group">
                <label for="nome">O seu Nome</label>
                <input type="text" id="nome" name="nome" required placeholder="Ex: João Silva">
            </div>

            <div class="form-group">
                <label for="telemovel">O seu Telemóvel (Opcional)</label>
                <input type="tel" id="telemovel" name="telemovel" placeholder="Ex: 912 345 678">
            </div>
            
            <div class="form-group">
                <label for="assunto">Assunto de Oração</label>
                <textarea id="assunto" name="assunto" required placeholder="Descreva aqui o seu pedido de oração..."></textarea>
            </div>
            
            <button type="submit">Enviar Pedido</button>
        </form>
    </div>
</body>
</html>
