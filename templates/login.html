<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container" style="max-width: 400px; margin-top: -100px">
        <h2>Acesso Restrito</h2>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Introduza a palavra-passe para aceder ao
            Dashboard.</p>

        {% if error %}
        <div
            style="background-color: #fee2e2; color: #ef4444; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div style="margin-bottom: 20px;">
                <label for="password"
                    style="display: block; margin-bottom: 8px; font-weight: bold;">Palavra-passe:</label>
                <input type="password" id="password" name="password" required
                    style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
            </div>
            <button type="submit" class="btn-primary"
                style="width: 100%; padding: 10px; background-color: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Entrar</button>
        </form>
    </div>
</body>

</html>
