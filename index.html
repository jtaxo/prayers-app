<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos de Oração - AD Azambuja</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css?v=2">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="loading">
    <!-- Ambient glow for mouse tracking -->
    <div id="ambient-glow"></div>
    <div id="particles-container"></div>

    <!-- Animated Mesh Gradient Background -->
    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>

    <!-- Top Left Brand -->
    <header class="premium-header stagger-1">
        <div class="brand-pill">
            <img src="static/img/logo.png" alt="Logo" class="brand-logo">
            <span class="brand-accent">AD</span>
            <span class="brand-text">Azambuja</span>
        </div>
    </header>

    <div class="badge top-right-badge stagger-1">Uma comunidade de fé</div>

    <main class="premium-layout" id="form-section">
        <!-- Lado esquerdo: Texto Hero -->
        <section class="hero-section stagger-2">
            <div class="hero-content">
                <h1 class="hero-title">Partilhe o seu <br /><span class="text-gradient">Pedido de Oração</span></h1>
                <p class="hero-subtitle">Não caminhe sozinho. Deixe o seu pedido e estaremos em intercessão. Deus pode!
                </p>
            </div>
        </section>

        <!-- Lado direito: Formulário Floating Glass -->
        <section class="form-section stagger-3">
            <div class="form-header">
                <h3>Deixe o seu pedido</h3>
                <p>Estaremos consigo em oração.</p>
            </div>
            <div class="glass-card">
                <form id="prayerForm" class="premium-form">
                    <div class="input-group">
                        <input type="text" id="nome" name="nome" placeholder=" ">
                        <label for="nome">O seu Nome (Opcional)</label>
                        <div class="input-border"></div>
                    </div>

                    <div class="input-group">
                        <input type="tel" id="telemovel" name="telemovel" placeholder=" ">
                        <label for="telemovel">O seu Telemóvel (Opcional)</label>
                        <div class="input-border"></div>
                    </div>

                    <div class="input-group textarea-group">
                        <textarea id="assunto" name="assunto" required placeholder=" "></textarea>
                        <label for="assunto">Assunto de Oração</label>
                        <div class="input-border"></div>
                    </div>

                    <button type="submit" class="premium-btn magnetic-btn">
                        <span class="btn-text">Enviar Pedido</span>
                        <div class="btn-glow"></div>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <!-- Secção de Sucesso (Oculta por defeito) -->
    <div id="success-section" class="premium-layout" style="display: none; text-align: center; margin: 15vh auto; justify-content: center;">
        <div class="glass-card" style="padding: 40px; max-width: 500px; width: 100%;">
            <span class="success-icon" style="font-size: 50px;">✨</span>
            <h1 class="text-gradient" style="font-size: 26px; font-weight: 800; margin: 20px 0;">Pedido Enviado!</h1>
            <p class="subtitle" style="margin-bottom: 30px;">O seu pedido de oração foi recebido. Estaremos orando por si.</p>
            <button id="btn-back" class="premium-btn">Enviar outro pedido</button>
        </div>
    </div>

    <script src="static/js/script.js"></script>
    <script src="static/js/supabase.js"></script>
    <script>
        document.getElementById('prayerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = document.getElementById('nome').value.trim() || 'Anónimo';
            const telemovel = document.getElementById('telemovel').value.trim() || null;
            const assunto = document.getElementById('assunto').value.trim();

            if (!assunto) return;

            const btn = e.target.querySelector('button[type="submit"]');
            const btnText = btn.querySelector('.btn-text');
            const originalText = btnText.innerText;
            
            btn.disabled = true;
            btnText.innerText = 'Enviado! ✔️';

            // ENVIO INSTANTÂNEO EM PANO DE FUNDO (Zero segundos de espera)
            fetch(`${SUPABASE_URL}/rest/v1/prayers`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ nome, telemovel, assunto }),
                keepalive: true // Garante que o pedido chega mesmo fechando o site!
            }).catch(err => console.error('Erro de background:', err));

            // Transição Mágica sem carregar páginas novas
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('success-section').style.display = 'flex';
            window.scrollTo(0, 0);

            // Preparar para o próximo pedido sem o utilizador notar
            setTimeout(() => {
                document.getElementById('assunto').value = '';
                document.getElementById('telemovel').value = '';
                btn.disabled = false;
                btnText.innerText = originalText;
            }, 500);
        });

        // Botão de voltar a pedir oração
        document.getElementById('btn-back').addEventListener('click', () => {
            document.getElementById('success-section').style.display = 'none';
            document.getElementById('form-section').style.display = 'flex';
        });
    </script>
</body>

</html>
