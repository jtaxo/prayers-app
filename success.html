<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Enviado</title>
    <link rel="stylesheet" href="static/css/style.css?v=2">
</head>
<body class="loading">
    <!-- Ambient glow for mouse tracking -->
    <div id="ambient-glow"></div>
    <div id="particles-container"></div>
    
    <!-- Animated Mesh Gradient Background -->
    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>

    <div class="container glass-card" style="margin: 15vh auto;">
        <span class="success-icon">✨</span>
        <h1 class="text-gradient" style="font-size: 36px; font-weight: 800;">Pedido Enviado!</h1>
        <p class="subtitle" style="margin-bottom: 20px; margin-top: 10px;">O seu pedido de oração foi recebido. Estaremos orando por si.</p>
        
        <button onclick="window.location.href='index.html'" class="btn-secondary">Enviar outro pedido</button>
    </div>
    <script src="static/js/script.js"></script>
</body>
</html>
