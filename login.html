<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Admin</title>
    <link rel="stylesheet" href="static/css/style.css?v=2">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="loading">
    <!-- Ambient glow for mouse tracking -->
    <div id="ambient-glow"></div>
    <div id="particles-container"></div>
    
    <!-- Animated Mesh Gradient Background -->
    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>

    <div class="container glass-card" style="margin: 15vh auto;">
        <h2 class="text-gradient" style="font-size: 28px; font-weight: 800; margin-bottom: 8px;">Acesso Restrito</h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">Introduza a palavra-passe para aceder ao Dashboard.</p>

        <div id="errorMessage" style="display: none; background-color: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px;">
            Palavra-passe incorreta!
        </div>

        <form id="loginForm" class="premium-form">
            <div class="input-group">
                <input type="password" id="password" name="password" required placeholder=" ">
                <label for="password">Palavra-passe</label>
                <div class="input-border"></div>
            </div>
            <button type="submit" class="premium-btn magnetic-btn">
                <span class="btn-text">Entrar</span>
                <div class="btn-glow"></div>
            </button>
        </form>
    </div>
    
    <script src="static/js/script.js"></script>
    <script src="static/js/supabase.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('admin_auth') === 'true') {
            window.location.href = 'admin.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.style.display = 'none';
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.querySelector('.btn-text').innerText;
            btn.disabled = true;
            btn.querySelector('.btn-text').innerText = 'A verificar...';

            try {
                // Vai buscar a palavra-passe à tabela 'settings' no Supabase
                const { data, error } = await supabaseClient
                    .from('settings')
                    .select('admin_password')
                    .eq('id', 1)
                    .single();

                if (error) {
                    console.error("A tabela settings não existe ou está vazia:", error);
                    alert("Aviso: Tabela 'settings' ainda não foi criada no Supabase!");
                    throw error;
                }

                // Compara a palavra-passe introduzida com a que está na base de dados
                if (password === data.admin_password) {
                    localStorage.setItem('admin_auth', 'true');
                    window.location.href = 'admin.html';
                } else {
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.querySelector('.btn-text').innerText = originalText;
            }
        });
    </script>
</body>

</html>
